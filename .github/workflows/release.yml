name: Build and Release JAR

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test pull request
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode clean verify

      - name: Package release JAR
        if: startsWith(github.ref, 'refs/tags/')
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Prepare release asset
        if: startsWith(github.ref, 'refs/tags/')
        id: release_asset
        shell: bash
        run: |
          set -euo pipefail

          pom_version="$(python -c 'import xml.etree.ElementTree as ET; root = ET.parse("pom.xml").getroot(); ns = {"m": "http://maven.apache.org/POM/4.0.0"}; print(root.findtext("m:version", namespaces=ns) or root.findtext("m:parent/m:version", namespaces=ns) or "")')"
          if [[ -z "${pom_version}" ]]; then
            echo "Could not read project version from pom.xml." >&2
            exit 1
          fi
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "${pom_version}" != "${tag_version}" ]]; then
            echo "Tag version (${tag_version}) does not match pom.xml version (${pom_version})." >&2
            exit 1
          fi

          jar_path="$(find target -maxdepth 1 -type f -name '*-exec.jar' | head -n 1)"
          if [[ -z "${jar_path}" ]]; then
            echo "No executable Spring Boot JAR matching target/*-exec.jar was produced." >&2
            exit 1
          fi

          mkdir -p release
          asset_name="stresspilot-${pom_version}.jar"
          cp "${jar_path}" "release/${asset_name}"

          {
            echo "version=${pom_version}"
            echo "asset_name=${asset_name}"
            echo "asset_path=release/${asset_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.release_asset.outputs.asset_path }}#${{ steps.release_asset.outputs.asset_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "StressPilot ${{ steps.release_asset.outputs.version }}" \
            --generate-notes
