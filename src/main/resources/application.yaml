server:
  address: 127.0.0.1
  port: 52000
  servlet:
    session:
      timeout: 30m

spring:
  profiles:
    active: dev
  application:
    name: stresspilot
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 10MB

  # ONLY CONFIGURE ON SERVER MODE
  datasource:
    url: jdbc:postgresql://localhost:5432/stresspilot
    username: postgres
    password: Viettel!VDS
    driver-class-name:
    hikari:
      minimum-idle: 20
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      initialization-fail-timeout: 1
      connection-init-sql: SELECT 1
      keepalive-time: 60000

  # ONLY CONFIGURE ON SERVER MODE
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ONLY CONFIGURE ON SERVER MODE
  flyway:
    locations:
      - classpath:db/postgres/migrations

application:
  mode: server

  cors:
    allowed-origins:
      - "localhost:3000"

  message:
    datasource:
      type: primary
    batch-size: 1000
    flush-interval-ms: 1000
    websocket:
      enabled: true
      push-interval-ms: 500
      max-per-push: 2000
      topic: /topic/logs
    kafka:
      enabled: false
      topic: stresspilot.request-logs
      bootstrap-servers: localhost:9092


management:
  endpoints:
    web:
      exposure:
        include: "health,shutdown"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      show-details: always