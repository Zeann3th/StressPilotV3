server:
  address: 127.0.0.1
  port: 52000
  servlet:
    session:
      timeout: 30m

spring:
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
  application:
    name: stresspilot
  data:
    redis:
      repositories:
        enabled: false
  ai:
    mcp:
      server:
        transport: SSE
        sse:
          path: /mcp/sse
        message:
          path: /mcp/message
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 10MB

  # # ONLY CONFIGURE ON SERVER MODE
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/stresspilot
  #   username: postgres
  #   password: Viettel!VDS
  #   driver-class-name:
  #   hikari:
  #     minimum-idle: 20
  #     maximum-pool-size: 20
  #     idle-timeout: 600000
  #     max-lifetime: 1800000
  #     connection-timeout: 30000
  #     initialization-fail-timeout: 1
  #     connection-init-sql: SELECT 1
  #     keepalive-time: 60000

  # # ONLY CONFIGURE ON SERVER MODE
  # jpa:
  #   open-in-view: false
  #   hibernate:
  #     ddl-auto: none
  #   show-sql: true
  #   properties:
  #     hibernate:
  #       format_sql: true
  #       jdbc:
  #         batch_size: 50
  #       order_inserts: true
  #       order_updates: true

  # # ONLY CONFIGURE ON SERVER MODE
  flyway:
    locations:
      - classpath:db/postgres/migrations
    enabled: false

application:
  mode: desktop

  distributed:
    enabled: false
    key-prefix: stresspilot
    node-id: ${HOSTNAME:${COMPUTERNAME:local}}
    worker-ttl-seconds: 15
    worker-heartbeat-seconds: 5
    worker-discovery-timeout-ms: 2000

  cors:
    allowed-origins:
      - "localhost:3000"

  message:
    datasource:
      type: primary
      queue-capacity: 200000
      offer-timeout-ms: 200
      batch-size: 1000
      flush-interval-ms: 1000
      max-retries: 3
      retry-base-delay-ms: 100
    sampling:
      enabled: false
      rate: 1.0
    websocket:
      enabled: true
      push-interval-ms: 500
      max-per-push: 2000
      topic: /topic/logs
    kafka:
      enabled: false
      topic: stresspilot.request-logs
      bootstrap-servers: localhost:9092

  tasks:
    run-snapshot:
      cron: "0 0/10 * * * ?"

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      show-details: always
