syntax = "proto3";

package dev.zeann3th.stresspilot.grpc.ui;

option java_multiple_files = true;
option java_package = "dev.zeann3th.stresspilot.grpc.ui";
option java_outer_classname = "ProjectProto";

import "google/protobuf/empty.proto";

service ProjectService {
  rpc ListProjects      (ListProjectsRequest)  returns (ListProjectsResponse);
  rpc GetProject        (GetProjectRequest)    returns (ProjectResponse);
  rpc CreateProject     (CreateProjectRequest) returns (ProjectResponse);
  rpc UpdateProject     (UpdateProjectRequest) returns (ProjectResponse);
  rpc DeleteProject     (DeleteProjectRequest) returns (google.protobuf.Empty);
  rpc ExportProject     (ExportProjectRequest) returns (ExportProjectResponse);
  rpc ImportProject     (ImportProjectRequest) returns (ProjectResponse);
}

message ListProjectsRequest {
  string name = 1;
  int32  page = 2;
  int32  size = 3;
  string sort = 4;
}

message GetProjectRequest {
  int64 id = 1;
}

message CreateProjectRequest {
  string name        = 1;
  string description = 2;
}

message UpdateProjectRequest {
  int64  id          = 1;
  string name        = 2;
  string description = 3;
}

message DeleteProjectRequest {
  int64 id = 1;
}

message ExportProjectRequest {
  int64 id = 1;
}

message ImportProjectRequest {
  bytes  content  = 1;
  string filename = 2;
}

message ProjectResponse {
  int64  id             = 1;
  string name           = 2;
  string description    = 3;
  int64  environment_id = 4;
  string created_at     = 5;
  string updated_at     = 6;
}

message ListProjectsResponse {
  repeated ProjectResponse projects      = 1;
  int64                    total_elements = 2;
  int32                    total_pages   = 3;
  int32                    page          = 4;
  int32                    size          = 5;
}

message ExportProjectResponse {
  bytes  content  = 1;
  string filename = 2;
}
