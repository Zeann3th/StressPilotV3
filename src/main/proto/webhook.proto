syntax = "proto3";

package dev.zeann3th.stresspilot.grpc.ui;

option java_multiple_files = true;
option java_package = "dev.zeann3th.stresspilot.grpc.ui";
option java_outer_classname = "WebhookProto";

import "google/protobuf/empty.proto";

service WebhookService {
  rpc Execute (WebhookExecuteRequest) returns (google.protobuf.Empty);
}

message WebhookExecuteRequest {
  bytes  content  = 1;
  string filename = 2;
}
