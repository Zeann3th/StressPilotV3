syntax = "proto3";

package dev.zeann3th.stresspilot.grpc.ui;

option java_multiple_files = true;
option java_package = "dev.zeann3th.stresspilot.grpc.ui";
option java_outer_classname = "EnvironmentProto";

import "google/protobuf/empty.proto";

service EnvironmentService {
  rpc GetEnvironmentVariables    (GetEnvironmentVariablesRequest)    returns (ListEnvironmentVariablesResponse);
  rpc UpdateEnvironmentVariables (UpdateEnvironmentVariablesRequest) returns (google.protobuf.Empty);
}

message EnvironmentVariableEntry {
  string key   = 1;
  string value = 2;
}

message GetEnvironmentVariablesRequest {
  int64 environment_id = 1;
}

message UpdateEnvironmentVariablesRequest {
  int64                            environment_id = 1;
  repeated EnvironmentVariableEntry variables      = 2;
}

message EnvironmentVariableResponse {
  int64  id     = 1;
  string key    = 2;
  string value  = 3;
  bool   active = 4;
  string created_at = 5;
  string updated_at = 6;
}

message ListEnvironmentVariablesResponse {
  repeated EnvironmentVariableResponse variables = 1;
}
