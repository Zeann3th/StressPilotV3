stresspilot:
  project:
    name: "Test"
    description: "This is a test project."

  environment:
    - name: "base_url"
      value: "https://api.example.com"
    - name: "auth_token"
      value: "Bearer abc123"

  endpoints:
    - id: "create_user"
      name: "Create User"
      type: "HTTP"
      url: "${base_url}/users"
      method: "POST"
      headers:
        Content-Type: "application/json"
        Authorization: "${auth_token}"
      body:
        key1: "value1"
        key2: "value2"

    - id: "get_user"
      name: "Get User"
      type: "HTTP"
      url: "${base_url}/users/${user_id}"
      method: "GET"
      headers:
        Authorization: "${auth_token}"
      parameters:
        page: "1"
        limit: "10"

  flows:
    - name: "main_flow"
      description: "This is the main flow."
      steps:
        - name: "start"
          type: "START"
          next_if_true: "check_condition"

        - name: "check_condition"
          type: "BRANCH"
          condition: "var1 == 'value1'"
          next_if_true: "call_create"
          next_if_false: "call_get"
          pre_process:
            inject:
              - name: "var1"
                value: "value1"
            delay: 5
          post_process:
            inject:
              - name: "var2"
                value: "value2"
            extract:
              - name: "var3"
                value: "response.body.key3"
            delay: 5

        - name: "call_create"
          type: "ENDPOINT"
          endpoint: "create_user"
          post_process:
            extract:
              - name: "user_id"
                value: "response.body.id"

        - name: "call_get"
          type: "ENDPOINT"
          endpoint: "get_user"

        - name: "run_sub"
          type: "SUBFLOW"
          condition: "other_flow"

    - name: "other_flow"
      description: "A sub flow."
      steps:
        - name: "start"
          type: "START"
          next_if_true: "do_something"

        - name: "do_something"
          type: "ENDPOINT"
          endpoint: "get_user"

  # Webhook-only: ignored during import/export
  run:
    threads: 10
    duration: 60
    ramp_up_duration: 5
